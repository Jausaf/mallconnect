<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MallConnect Bihar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        .contact-container {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
        }
        .contact-info {
            flex: 1;
            min-width: 300px;
        }
        .contact-form {
            flex: 2;
            min-width: 300px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .info-item {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .info-item i {
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="assets/images/logo.png" alt="MallConnect Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="brands.html">Brands</a></li>
                <li><a href="cities.html">Cities</a></li>
                <li><a href="partners.html">Partners</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="store-login.html" class="cta-button" style="padding: 0.5rem 1rem;">Store Login</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h1>Get In Touch</h1>
        <p>Have questions? We're here to help.</p>
        
        <div class="contact-container">
            <div class="contact-info">
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h3>Office</h3>
                        <p>Patna, Bihar, India</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h3>Email</h3>
                        <p>info@mallconnect.in</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h3>Phone</h3>
                        <p>+91 12345 67890</p>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Inquiry Type</label>
                        <select>
                            <option>Customer Support</option>
                            <option>Mall Partnership</option>
                            <option>Brand Partnership</option>
                            <option>Careers</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="How can we help you?"></textarea>
                    </div>
                    <button type="submit" class="cta-button" style="border: none; width: 100%; cursor: pointer;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 MallConnect Bihar. One Platform. Every Brand. Every Mall. Every City.</p>
    </footer>
</body>
</html>
